[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hookwing"
version = "0.0.1"
description = "Hookwing webhook SDK for Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "Hookwing", email = "dev@hookwing.com" }
]
keywords = ["webhook", "verification", "hmac", "api"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.20",
]

[project.urls]
Homepage = "https://hookwing.com"
Documentation = "https://docs.hookwing.com"
Repository = "https://github.com/hookwing/hookwing"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
