name = "hookwing-api-dev"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "hookwing-dev"
database_id = "4a7b86d7-238a-4c9d-9e00-281351493b52"

# Queue for webhook delivery
[[queues.consumers]]
queue = "webhook-delivery-dev"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0  # We handle retries ourselves

[[queues.producers]]
queue = "webhook-delivery-dev"
binding = "DELIVERY_QUEUE"

[observability.traces]
enabled = true
head_sampling_rate = 1.0

[observability.logs]
enabled = true
head_sampling_rate = 1.0

# Production environment
[env.production]
name = "hookwing-api"
compatibility_flags = ["nodejs_compat"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "hookwing-prod"
database_id = "be1688fb-a309-4719-8032-3f1ae1a56b58"

[[env.production.queues.consumers]]
queue = "webhook-delivery-prod"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 0

[[env.production.queues.producers]]
queue = "webhook-delivery-prod"
binding = "DELIVERY_QUEUE"
# database_id = "placeholder-will-be-set-on-deploy"

[env.production.observability.traces]
enabled = true
head_sampling_rate = 1.0

[env.production.observability.logs]
enabled = true
head_sampling_rate = 1.0
