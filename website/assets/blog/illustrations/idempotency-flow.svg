<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <linearGradient id="bgi" x1="0" y1="0" x2="800" y2="340">
      <stop offset="0%" stop-color="#002A3A"/>
      <stop offset="100%" stop-color="#003D54"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7" fill="#94A3B8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7" fill="#009D64"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7" fill="#DC2626"/>
    </marker>
  </defs>
  <rect width="800" height="340" rx="12" fill="url(#bgi)"/>
  <text x="400" y="36" text-anchor="middle" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" opacity=".7">IDEMPOTENCY FLOW</text>
  <!-- Step 1: Event arrives -->
  <rect x="40" y="70" width="140" height="60" rx="8" fill="#0B1220" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="110" y="95" text-anchor="middle" fill="#3B82F6" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Event Arrives</text>
  <text x="110" y="115" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">evt_abc123</text>
  <!-- Arrow -->
  <line x1="180" y1="100" x2="225" y2="100" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Step 2: Check key -->
  <rect x="230" y="70" width="160" height="60" rx="8" fill="#0B1220" stroke="#FFC107" stroke-width="1.5"/>
  <text x="310" y="95" text-anchor="middle" fill="#FFC107" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Check Idempotency Key</text>
  <text x="310" y="115" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Key exists in store?</text>
  <!-- Branch: New -->
  <line x1="310" y1="130" x2="310" y2="155" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="270" y="165" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">No (new)</text>
  <line x1="310" y1="165" x2="310" y2="180" stroke="#009D64" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Branch: Duplicate -->
  <line x1="390" y1="100" x2="490" y2="100" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="420" y="92" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">Yes (duplicate)</text>
  <!-- Duplicate path -->
  <rect x="495" y="70" width="140" height="60" rx="8" fill="#0B1220" stroke="#DC2626" stroke-width="1.5"/>
  <text x="565" y="95" text-anchor="middle" fill="#DC2626" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Skip Processing</text>
  <text x="565" y="115" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Return 200 OK</text>
  <!-- New path: Write key -->
  <rect x="230" y="185" width="160" height="50" rx="8" fill="#0B1220" stroke="#009D64" stroke-width="1.5"/>
  <text x="310" y="207" text-anchor="middle" fill="#009D64" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Write Key (Atomic)</text>
  <text x="310" y="225" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">INSERT ON CONFLICT</text>
  <!-- Arrow down -->
  <line x1="310" y1="235" x2="310" y2="260" stroke="#009D64" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Process -->
  <rect x="230" y="265" width="160" height="50" rx="8" fill="#009D64" opacity=".15" stroke="#009D64" stroke-width="1.5"/>
  <text x="310" y="287" text-anchor="middle" fill="#009D64" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Process Event</text>
  <text x="310" y="305" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Business logic runs</text>
  <!-- Race condition note -->
  <rect x="495" y="185" width="260" height="50" rx="8" fill="#0B1220" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="515" y="207" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">⚡ If two workers race, the atomic</text>
  <text x="515" y="225" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">write ensures only one wins.</text>
  <!-- Arrow from process to complete -->
  <line x1="390" y1="290" x2="500" y2="290" stroke="#009D64" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Complete -->
  <rect x="505" y="265" width="140" height="50" rx="8" fill="#009D64" opacity=".2" stroke="#009D64" stroke-width="1.5"/>
  <text x="575" y="287" text-anchor="middle" fill="#009D64" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">Mark Complete</text>
  <text x="575" y="305" text-anchor="middle" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="10">Update key state</text>
</svg>
