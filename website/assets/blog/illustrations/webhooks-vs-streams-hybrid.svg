<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="340" fill="#002A3A" rx="12"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#FDFBF4" font-size="14" font-weight="600">Production Pattern: Three Layers</text>

  <!-- ========== LAYER 1: INGESTION ========== -->
  <g id="layer-1">
    <!-- Background -->
    <rect x="40" y="50" width="820" height="80" rx="8" fill="#0B1220" opacity="0.5" stroke="#009D64" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Layer label -->
    <text x="60" y="72" fill="#009D64" font-size="11" font-weight="600" opacity="0.7">INGESTION LAYER</text>

    <!-- External events box -->
    <rect x="80" y="85" width="100" height="35" rx="6" fill="#1a1a2a" stroke="#FFC107" stroke-width="1.5"/>
    <text x="130" y="107" text-anchor="middle" fill="#FFC107" font-size="12" font-weight="600">External</text>
    <text x="130" y="121" text-anchor="middle" fill="#FFC107" font-size="11">Webhooks</text>

    <!-- Arrow 1 -->
    <line x1="182" y1="102" x2="230" y2="102" stroke="#009D64" stroke-width="2"/>
    <polygon points="230,97 242,102 230,107" fill="#009D64"/>

    <!-- Hookwing box -->
    <rect x="250" y="85" width="120" height="35" rx="6" fill="#1a1a2a" stroke="#009D64" stroke-width="2"/>
    <text x="310" y="107" text-anchor="middle" fill="#009D64" font-size="12" font-weight="600">Hookwing</text>
    <text x="310" y="121" text-anchor="middle" fill="#009D64" font-size="10">(Reliable delivery)</text>

    <!-- Arrow 2 -->
    <line x1="372" y1="102" x2="420" y2="102" stroke="#009D64" stroke-width="2"/>
    <polygon points="420,97 432,102 420,107" fill="#009D64"/>

    <!-- Your handler box -->
    <rect x="440" y="85" width="110" height="35" rx="6" fill="#1a1a2a" stroke="#009D64" stroke-width="1.5"/>
    <text x="495" y="107" text-anchor="middle" fill="#009D64" font-size="12" font-weight="600">Your Handler</text>
    <text x="495" y="121" text-anchor="middle" fill="#009D64" font-size="10">(Process event)</text>
  </g>

  <!-- ========== LAYER 2: INTERNAL BUS ========== -->
  <g id="layer-2">
    <!-- Background -->
    <rect x="40" y="150" width="820" height="80" rx="8" fill="#0B1220" opacity="0.5" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Layer label -->
    <text x="60" y="172" fill="#3B82F6" font-size="11" font-weight="600" opacity="0.7">INTERNAL LAYER</text>

    <!-- Arrow from layer 1 -->
    <line x1="495" y1="120" x2="495" y2="160" stroke="#009D64" stroke-width="2"/>
    <polygon points="490,160 495,172 500,160" fill="#009D64"/>

    <!-- Event stream box -->
    <rect x="420" y="185" width="150" height="35" rx="6" fill="#1a1a2a" stroke="#3B82F6" stroke-width="2"/>
    <text x="495" y="207" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="600">Event Stream</text>
    <text x="495" y="221" text-anchor="middle" fill="#3B82F6" font-size="10">(Kafka / Pub/Sub)</text>

    <!-- Three independent subscribers below the stream -->
    <text x="495" y="230" text-anchor="middle" fill="#94A3B8" font-size="10" opacity="0.7">Multiple independent consumers</text>
  </g>

  <!-- ========== LAYER 3: CONSUMPTION ========== -->
  <g id="layer-3">
    <!-- Background -->
    <rect x="40" y="250" width="820" height="80" rx="8" fill="#0B1220" opacity="0.5" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Layer label -->
    <text x="60" y="272" fill="#6B7280" font-size="11" font-weight="600" opacity="0.7">CONSUMPTION LAYER</text>

    <!-- Arrow from layer 2 -->
    <line x1="495" y1="220" x2="495" y2="260" stroke="#3B82F6" stroke-width="2"/>
    <polygon points="490,260 495,272 500,260" fill="#3B82F6"/>

    <!-- Three consumer boxes -->
    <!-- Billing -->
    <rect x="100" y="285" width="95" height="35" rx="6" fill="#1a1a2a" stroke="#009D64" stroke-width="1.5"/>
    <text x="147.5" y="307" text-anchor="middle" fill="#009D64" font-size="12" font-weight="600">Billing</text>
    <text x="147.5" y="321" text-anchor="middle" fill="#009D64" font-size="10">(Batch daily)</text>

    <!-- Analytics -->
    <rect x="240" y="285" width="95" height="35" rx="6" fill="#1a1a2a" stroke="#FFC107" stroke-width="1.5"/>
    <text x="287.5" y="307" text-anchor="middle" fill="#FFC107" font-size="12" font-weight="600">Analytics</text>
    <text x="287.5" y="321" text-anchor="middle" fill="#FFC107" font-size="10">(Real-time)</text>

    <!-- Fraud Detector -->
    <rect x="380" y="285" width="95" height="35" rx="6" fill="#1a1a2a" stroke="#DC2626" stroke-width="1.5"/>
    <text x="427.5" y="307" text-anchor="middle" fill="#DC2626" font-size="12" font-weight="600">Fraud Check</text>
    <text x="427.5" y="321" text-anchor="middle" fill="#DC2626" font-size="10">(React fast)</text>

    <!-- Agent Fleet -->
    <rect x="520" y="285" width="95" height="35" rx="6" fill="#1a1a2a" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="567.5" y="307" text-anchor="middle" fill="#3B82F6" font-size="12" font-weight="600">Agent Fleet</text>
    <text x="567.5" y="321" text-anchor="middle" fill="#3B82F6" font-size="10">(Webhooks)</text>

    <!-- Notifications -->
    <rect x="660" y="285" width="95" height="35" rx="6" fill="#1a1a2a" stroke="#6B7280" stroke-width="1.5"/>
    <text x="707.5" y="307" text-anchor="middle" fill="#6B7280" font-size="12" font-weight="600">Notifications</text>
    <text x="707.5" y="321" text-anchor="middle" fill="#6B7280" font-size="10">(Independent)</text>

    <!-- Arrows from stream to consumers -->
    <line x1="420" y1="202" x2="147.5" y2="285" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
    <line x1="450" y1="202" x2="287.5" y2="285" stroke="#FFC107" stroke-width="1.5" opacity="0.5"/>
    <line x1="495" y1="220" x2="427.5" y2="285" stroke="#DC2626" stroke-width="1.5" opacity="0.5"/>
    <line x1="540" y1="202" x2="567.5" y2="285" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
    <line x1="570" y1="202" x2="707.5" y2="285" stroke="#6B7280" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Summary text at bottom -->
  <text x="450" y="335" text-anchor="middle" fill="#94A3B8" font-size="11">Each consumer reads at its own pace. No fan-out complexity. Replay any time.</text>
</svg>
