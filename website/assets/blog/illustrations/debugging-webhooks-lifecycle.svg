<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="320" fill="#002A3A" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#FDFBF4" font-size="14" font-weight="600">Webhook Delivery Lifecycle — Where Events Get Lost</text>

  <!-- Stage boxes -->
  <!-- Sender -->
  <rect x="30" y="100" width="120" height="56" rx="8" fill="#0B1220" stroke="#1E293B" stroke-width="1.5"/>
  <text x="90" y="122" text-anchor="middle" fill="#94A3B8" font-size="11">Sender</text>
  <text x="90" y="140" text-anchor="middle" fill="#FDFBF4" font-size="13" font-weight="600">POST /webhooks</text>

  <!-- Arrow 1 -->
  <line x1="152" y1="128" x2="188" y2="128" stroke="#009D64" stroke-width="2"/>
  <polygon points="188,123 198,128 188,133" fill="#009D64"/>

  <!-- Public Endpoint -->
  <rect x="200" y="100" width="130" height="56" rx="8" fill="#0B1220" stroke="#1E293B" stroke-width="1.5"/>
  <text x="265" y="122" text-anchor="middle" fill="#94A3B8" font-size="11">Public Endpoint</text>
  <text x="265" y="140" text-anchor="middle" fill="#FDFBF4" font-size="13" font-weight="600">Receive</text>

  <!-- Arrow 2 -->
  <line x1="332" y1="128" x2="368" y2="128" stroke="#009D64" stroke-width="2"/>
  <polygon points="368,123 378,128 368,133" fill="#009D64"/>

  <!-- Middleware -->
  <rect x="380" y="100" width="140" height="56" rx="8" fill="#0B1220" stroke="#DC2626" stroke-width="2"/>
  <text x="450" y="122" text-anchor="middle" fill="#DC2626" font-size="11">⚠ Middleware Chain</text>
  <text x="450" y="140" text-anchor="middle" fill="#FDFBF4" font-size="13" font-weight="600">Body Parsing</text>

  <!-- Arrow 3 -->
  <line x1="522" y1="128" x2="558" y2="128" stroke="#009D64" stroke-width="2"/>
  <polygon points="558,123 568,128 558,133" fill="#009D64"/>

  <!-- Handler -->
  <rect x="570" y="100" width="130" height="56" rx="8" fill="#0B1220" stroke="#DC2626" stroke-width="2"/>
  <text x="635" y="122" text-anchor="middle" fill="#DC2626" font-size="11">⚠ Handler</text>
  <text x="635" y="140" text-anchor="middle" fill="#FDFBF4" font-size="13" font-weight="600">Process + Log</text>

  <!-- Arrow 4 -->
  <line x1="702" y1="128" x2="738" y2="128" stroke="#009D64" stroke-width="2"/>
  <polygon points="738,123 748,128 738,133" fill="#009D64"/>

  <!-- Response -->
  <rect x="750" y="100" width="120" height="56" rx="8" fill="#0B1220" stroke="#DC2626" stroke-width="2"/>
  <text x="810" y="122" text-anchor="middle" fill="#DC2626" font-size="11">⚠ Response</text>
  <text x="810" y="140" text-anchor="middle" fill="#FDFBF4" font-size="13" font-weight="600">200 OK</text>

  <!-- Failure annotations -->
  <!-- Middleware failure -->
  <rect x="360" y="196" width="180" height="52" rx="6" fill="#1a0a0a" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="216" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="600">Failure point 1</text>
  <text x="450" y="232" text-anchor="middle" fill="#94A3B8" font-size="10">Body consumed before logging</text>
  <text x="450" y="246" text-anchor="middle" fill="#94A3B8" font-size="10">Signature verification breaks</text>
  <line x1="450" y1="158" x2="450" y2="196" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Handler failure -->
  <rect x="540" y="196" width="190" height="52" rx="6" fill="#1a0a0a" stroke="#FFC107" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="635" y="216" text-anchor="middle" fill="#FFC107" font-size="11" font-weight="600">Failure point 2</text>
  <text x="635" y="232" text-anchor="middle" fill="#94A3B8" font-size="10">Exception before log call</text>
  <text x="635" y="246" text-anchor="middle" fill="#94A3B8" font-size="10">Event silently unprocessed</text>
  <line x1="635" y1="158" x2="635" y2="196" stroke="#FFC107" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Response failure -->
  <rect x="720" y="196" width="170" height="52" rx="6" fill="#1a0a0a" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="810" y="216" text-anchor="middle" fill="#DC2626" font-size="11" font-weight="600">Failure point 3</text>
  <text x="810" y="232" text-anchor="middle" fill="#94A3B8" font-size="10">Handler crashed, framework</text>
  <text x="810" y="246" text-anchor="middle" fill="#94A3B8" font-size="10">returns 200 anyway</text>
  <line x1="810" y1="158" x2="810" y2="196" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="30" y="270" width="12" height="12" rx="2" fill="#DC2626"/>
  <text x="48" y="281" fill="#94A3B8" font-size="11">Silent failure risk</text>
  <rect x="170" y="270" width="12" height="12" rx="2" fill="#FFC107"/>
  <text x="188" y="281" fill="#94A3B8" font-size="11">Data loss risk</text>
  <rect x="290" y="270" width="12" height="12" rx="2" fill="#009D64"/>
  <text x="308" y="281" fill="#94A3B8" font-size="11">Happy path</text>
</svg>
