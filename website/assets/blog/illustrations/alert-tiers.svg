<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bga" x1="0" y1="0" x2="800" y2="300">
      <stop offset="0%" stop-color="#002A3A"/>
      <stop offset="100%" stop-color="#003D54"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" rx="12" fill="url(#bga)"/>
  <text x="400" y="36" text-anchor="middle" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" opacity=".7">ALERT THRESHOLD TIERS</text>
  <!-- Tier 1: Critical -->
  <rect x="40" y="60" width="230" height="210" rx="10" fill="#0B1220" stroke="#DC2626" stroke-width="2"/>
  <rect x="40" y="60" width="230" height="40" rx="10" fill="#DC2626" opacity=".15"/>
  <rect x="40" y="88" width="230" height="2" fill="#DC2626" opacity=".3"/>
  <text x="70" y="85" fill="#DC2626" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">🔴 TIER 1: CRITICAL</text>
  <text x="60" y="120" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">Action: Page on-call</text>
  <text x="60" y="148" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Success &lt; 95%</text>
  <text x="60" y="170" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">P95 latency &gt; 15s</text>
  <text x="60" y="192" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Error rate &gt; 10%</text>
  <text x="60" y="224" fill="#DC2626" font-family="Inter,system-ui,sans-serif" font-size="11" opacity=".8">Window: 5 min</text>
  <text x="60" y="244" fill="#DC2626" font-family="Inter,system-ui,sans-serif" font-size="11" opacity=".8">Response: Immediate</text>
  <!-- Tier 2: Warning -->
  <rect x="285" y="60" width="230" height="210" rx="10" fill="#0B1220" stroke="#FFC107" stroke-width="2"/>
  <rect x="285" y="60" width="230" height="40" rx="10" fill="#FFC107" opacity=".12"/>
  <rect x="285" y="88" width="230" height="2" fill="#FFC107" opacity=".3"/>
  <text x="315" y="85" fill="#FFC107" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">🟡 TIER 2: WARNING</text>
  <text x="305" y="120" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">Action: Slack alert</text>
  <text x="305" y="148" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Success 90-95%</text>
  <text x="305" y="170" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">P95 latency 5-15s</text>
  <text x="305" y="192" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Error rate 5-10%</text>
  <text x="305" y="214" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Retry rate &gt; 15%</text>
  <text x="305" y="244" fill="#FFC107" font-family="Inter,system-ui,sans-serif" font-size="11" opacity=".8">Window: 30 min</text>
  <!-- Tier 3: Info -->
  <rect x="530" y="60" width="230" height="210" rx="10" fill="#0B1220" stroke="#3B82F6" stroke-width="2"/>
  <rect x="530" y="60" width="230" height="40" rx="10" fill="#3B82F6" opacity=".12"/>
  <rect x="530" y="88" width="230" height="2" fill="#3B82F6" opacity=".3"/>
  <text x="560" y="85" fill="#3B82F6" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">🔵 TIER 3: INFO</text>
  <text x="550" y="120" fill="#94A3B8" font-family="Inter,system-ui,sans-serif" font-size="11">Action: Log only</text>
  <text x="550" y="148" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Dedup rate &gt; 5%</text>
  <text x="550" y="170" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Latency +50ms/week</text>
  <text x="550" y="192" fill="#FDFBF4" font-family="Inter,system-ui,sans-serif" font-size="12">Error rate ~3%</text>
  <text x="550" y="244" fill="#3B82F6" font-family="Inter,system-ui,sans-serif" font-size="11" opacity=".8">Window: Trending</text>
</svg>
