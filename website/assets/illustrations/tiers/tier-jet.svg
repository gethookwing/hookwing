<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-label="Jet — Enterprise tier">
  <defs>
    <linearGradient id="bg-jet" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#001A24"/>
      <stop offset="100%" stop-color="#002233"/>
    </linearGradient>
    <filter id="glow-jet">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="80" height="80" rx="10" fill="url(#bg-jet)"/>

  <!-- Stars / altitude dots — enterprise = highest altitude -->
  <circle cx="12" cy="14" r="1" fill="#FDFBF4" opacity=".3"/>
  <circle cx="26" cy="8"  r=".8" fill="#FDFBF4" opacity=".2"/>
  <circle cx="58" cy="10" r="1" fill="#FDFBF4" opacity=".25"/>
  <circle cx="70" cy="16" r=".7" fill="#FDFBF4" opacity=".2"/>
  <circle cx="68" cy="62" r=".8" fill="#FDFBF4" opacity=".15"/>

  <!-- Subtle white ambient -->
  <ellipse cx="40" cy="38" rx="22" ry="9" fill="#FDFBF4" fill-opacity=".04"/>

  <!-- Contrail / exhaust trail -->
  <line x1="6"  y1="39" x2="14" y2="39" stroke="#FDFBF4" stroke-width="1.5" stroke-linecap="round" opacity=".35"/>
  <line x1="4"  y1="43" x2="10" y2="41" stroke="#FDFBF4" stroke-width="1"   stroke-linecap="round" opacity=".15"/>
  <line x1="4"  y1="35" x2="10" y2="37" stroke="#FDFBF4" stroke-width="1"   stroke-linecap="round" opacity=".15"/>

  <g filter="url(#glow-jet)">
    <!-- Fuselage — ultra-sleek tube -->
    <ellipse cx="42" cy="39" rx="28" ry="4.5" fill="#FDFBF4" fill-opacity=".12" stroke="#FDFBF4" stroke-width="1.5"/>

    <!-- Delta wing — single clean triangle -->
    <polygon points="40,35 66,26 70,39 66,39" fill="#FDFBF4" fill-opacity=".14" stroke="#FDFBF4" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="40,43 66,52 70,39 66,39" fill="#FDFBF4" fill-opacity=".10" stroke="#FDFBF4" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Wing leading edge — bright line -->
    <line x1="40" y1="35" x2="66" y2="26" stroke="#FDFBF4" stroke-width="1.2" opacity=".7"/>
    <line x1="40" y1="43" x2="66" y2="52" stroke="#FDFBF4" stroke-width="1"   opacity=".5"/>

    <!-- Nose cone — sharp pointed -->
    <polygon points="70,39 78,37 78,41" fill="#FDFBF4" fill-opacity=".35" stroke="#FDFBF4" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Engine nacelles — twin, under fuselage -->
    <rect x="30" y="43" width="18" height="5" rx="2.5" fill="#001A24" stroke="#FDFBF4" stroke-width="1" opacity=".7"/>
    <rect x="30" y="31" width="18" height="5" rx="2.5" fill="#001A24" stroke="#FDFBF4" stroke-width="1" opacity=".7"/>

    <!-- Engine nozzle glow -->
    <ellipse cx="30" cy="45.5" rx="2.5" ry="2.5" fill="#009D64" fill-opacity=".5"/>
    <ellipse cx="30" cy="33.5" rx="2.5" ry="2.5" fill="#009D64" fill-opacity=".5"/>

    <!-- Cockpit — narrow visor -->
    <polygon points="58,35 68,35 68,37 60,39" fill="#001A24" stroke="#FDFBF4" stroke-width=".8" opacity=".9"/>

    <!-- Tail fin -->
    <polygon points="14,39 14,33 20,39" fill="#FDFBF4" fill-opacity=".2" stroke="#FDFBF4" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <text x="40" y="70" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8.5" font-weight="600" fill="#FDFBF4" letter-spacing=".08em" opacity=".85">ENTERPRISE</text>
</svg>
