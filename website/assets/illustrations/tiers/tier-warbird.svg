<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-label="Warbird — Scale tier (featured)">
  <defs>
    <linearGradient id="bg-wb" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#001A24"/>
      <stop offset="100%" stop-color="#002A3A"/>
    </linearGradient>
    <filter id="glow-wb">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Slightly darker bg — featured tier gets extra depth -->
  <rect width="80" height="80" rx="10" fill="url(#bg-wb)"/>

  <!-- Amber radial glow -->
  <circle cx="40" cy="36" r="20" fill="#FFC107" fill-opacity=".06"/>

  <!-- Faint grid -->
  <line x1="0" y1="40" x2="80" y2="40" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>
  <line x1="40" y1="0" x2="40" y2="80" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>

  <!-- Speed lines trailing left -->
  <line x1="6" y1="35" x2="18" y2="35" stroke="#FFC107" stroke-width=".8" opacity=".3" stroke-linecap="round"/>
  <line x1="4" y1="39" x2="16" y2="39" stroke="#FFC107" stroke-width=".8" opacity=".2" stroke-linecap="round"/>
  <line x1="7" y1="43" x2="17" y2="43" stroke="#FFC107" stroke-width=".8" opacity=".25" stroke-linecap="round"/>

  <g filter="url(#glow-wb)">
    <!-- Fuselage — sleek, elongated -->
    <ellipse cx="42" cy="39" rx="26" ry="5.5" fill="#FFC107" fill-opacity=".15" stroke="#FFC107" stroke-width="1.5"/>

    <!-- Swept wings — aggressive angle -->
    <polygon points="42,34 64,26 68,39 64,39" fill="#FFC107" fill-opacity=".2" stroke="#FFC107" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="42,44 64,52 68,39 64,39" fill="#FFC107" fill-opacity=".15" stroke="#E6A800" stroke-width="1.3" stroke-linejoin="round"/>

    <!-- Wing leading-edge highlight -->
    <line x1="42" y1="34" x2="64" y2="26" stroke="#FFC107" stroke-width="1" opacity=".6"/>

    <!-- Nose — pointed -->
    <polygon points="68,39 76,36 76,42" fill="#FFC107" fill-opacity=".3" stroke="#FFC107" stroke-width="1.3" stroke-linejoin="round"/>

    <!-- Tail assembly -->
    <polygon points="16,39 16,33 22,39" fill="#FFC107" fill-opacity=".25" stroke="#E6A800" stroke-width="1.2" stroke-linejoin="round"/>
    <polygon points="16,39 16,45 22,39" fill="#FFC107" fill-opacity=".18" stroke="#E6A800" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Cockpit bubble -->
    <ellipse cx="56" cy="35" rx="5.5" ry="3" fill="#001A24" stroke="#FFC107" stroke-width="1" opacity=".9"/>

    <!-- Engine exhaust circles -->
    <circle cx="18" cy="37" r="2.5" fill="#FFC107" fill-opacity=".2" stroke="#FFC107" stroke-width=".8"/>
    <circle cx="18" cy="41" r="2.5" fill="#FFC107" fill-opacity=".15" stroke="#E6A800" stroke-width=".8"/>
  </g>

  <!-- Afterburner glow dots -->
  <circle cx="15" cy="38" r="3" fill="#FFC107" opacity=".3"/>
  <circle cx="12" cy="38" r="2" fill="#FFC107" opacity=".15"/>

  <text x="40" y="70" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8.5" font-weight="600" fill="#FFC107" letter-spacing=".08em" opacity=".9">SCALE</text>
</svg>
