<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-label="Paper Plane — Free tier">
  <defs>
    <linearGradient id="bg-pp" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002A3A"/>
      <stop offset="100%" stop-color="#003D54"/>
    </linearGradient>
    <filter id="glow-pp">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="80" height="80" rx="10" fill="url(#bg-pp)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="40" x2="80" y2="40" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>
  <line x1="40" y1="0" x2="40" y2="80" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>

  <!-- Flight path dotted trail -->
  <line x1="14" y1="44" x2="62" y2="32" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 3" opacity=".35"/>

  <!-- Paper plane — flying right and slightly up, crisp origami form -->
  <g filter="url(#glow-pp)" transform="translate(18, 26)">
    <!-- Main body triangle -->
    <polygon points="0,18 44,9 0,0" fill="#94A3B8" fill-opacity=".14" stroke="#94A3B8" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Belly fold / lower wing separation -->
    <polygon points="0,18 44,9 10,12" fill="#94A3B8" fill-opacity=".22" stroke="#94A3B8" stroke-width=".8" stroke-linejoin="round" opacity=".7"/>
    <!-- Crease line top -->
    <line x1="0" y1="0" x2="44" y2="9" stroke="#94A3B8" stroke-width=".8" opacity=".4"/>
    <!-- Center fold -->
    <line x1="10" y1="12" x2="44" y2="9" stroke="#94A3B8" stroke-width="1" stroke-linecap="round" opacity=".55"/>
    <!-- Tail edge -->
    <line x1="0" y1="0" x2="0" y2="18" stroke="#94A3B8" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
  </g>

  <!-- Departure dot (origin point) -->
  <circle cx="14" cy="44" r="2" fill="#94A3B8" opacity=".4"/>

  <!-- "FREE" label -->
  <text x="40" y="70" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8.5" font-weight="600" fill="#94A3B8" letter-spacing=".08em" opacity=".8">FREE</text>
</svg>
