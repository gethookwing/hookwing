<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-label="Biplane — Growth tier">
  <defs>
    <linearGradient id="bg-bi" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002A3A"/>
      <stop offset="100%" stop-color="#003D54"/>
    </linearGradient>
    <filter id="glow-bi">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="80" height="80" rx="10" fill="url(#bg-bi)"/>

  <!-- Grid -->
  <line x1="0" y1="40" x2="80" y2="40" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>
  <line x1="40" y1="0" x2="40" y2="80" stroke="rgba(255,255,255,.04)" stroke-width=".5"/>

  <!-- Emerald ambient glow behind aircraft -->
  <ellipse cx="40" cy="38" rx="22" ry="10" fill="#009D64" fill-opacity=".07"/>

  <g filter="url(#glow-bi)">
    <!-- Fuselage — horizontal body -->
    <rect x="14" y="35" width="52" height="9" rx="4.5" fill="#009D64" fill-opacity=".18" stroke="#009D64" stroke-width="1.5"/>

    <!-- Top wing — wider, higher -->
    <rect x="18" y="22" width="40" height="8" rx="3" fill="#009D64" fill-opacity=".2" stroke="#009D64" stroke-width="1.5"/>

    <!-- Bottom wing — slightly narrower, lower -->
    <rect x="22" y="44" width="32" height="7" rx="3" fill="#009D64" fill-opacity=".15" stroke="#009D64" stroke-width="1.3"/>

    <!-- Vertical struts (connecting wings) -->
    <line x1="27" y1="30" x2="27" y2="44" stroke="#009D64" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="47" y1="30" x2="47" y2="44" stroke="#009D64" stroke-width="1.3" stroke-linecap="round"/>

    <!-- Nose cowling -->
    <ellipse cx="66" cy="39.5" rx="3.5" ry="4" fill="#009D64" fill-opacity=".25" stroke="#009D64" stroke-width="1.3"/>

    <!-- Propeller disc -->
    <ellipse cx="67" cy="39.5" rx="1.5" ry="7" fill="none" stroke="#009D64" stroke-width="1" opacity=".5"/>

    <!-- Tail fin (vertical) -->
    <polygon points="14,35 14,44 8,30" fill="#009D64" fill-opacity=".2" stroke="#009D64" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Cockpit canopy -->
    <ellipse cx="50" cy="33" rx="6" ry="3.5" fill="#001A24" stroke="#009D64" stroke-width="1" opacity=".8"/>
  </g>

  <!-- Wheel undercarriage dots -->
  <circle cx="28" cy="52" r="2.5" fill="#009D64" fill-opacity=".3" stroke="#009D64" stroke-width="1"/>
  <circle cx="46" cy="52" r="2.5" fill="#009D64" fill-opacity=".3" stroke="#009D64" stroke-width="1"/>
  <line x1="28" y1="51" x2="28" y2="44" stroke="#009D64" stroke-width=".8" opacity=".4"/>
  <line x1="46" y1="51" x2="46" y2="44" stroke="#009D64" stroke-width=".8" opacity=".4"/>

  <text x="40" y="70" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8.5" font-weight="600" fill="#009D64" letter-spacing=".08em" opacity=".85">GROWTH</text>
</svg>
