<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="Agent-native — built for autonomous systems">
  <defs>
    <linearGradient id="bg-ag" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#002A3A"/>
      <stop offset="100%" stop-color="#003D54"/>
    </linearGradient>
    <filter id="glow-ag">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="48" height="48" rx="10" fill="url(#bg-ag)"/>

  <!-- Agent node — central hexagon -->
  <g filter="url(#glow-ag)">
    <polygon points="24,8 31,12 31,20 24,24 17,20 17,12" fill="#FFC107" fill-opacity=".15" stroke="#FFC107" stroke-width="1.4" stroke-linejoin="round"/>
    <!-- Inner core -->
    <circle cx="24" cy="16" r="3.5" fill="#FFC107" fill-opacity=".3" stroke="#FFC107" stroke-width="1"/>

    <!-- Webhook signal arcs radiating out -->
    <path d="M 31,20 C 38,22 40,28 36,33" stroke="#009D64" stroke-width="1.3" stroke-linecap="round" fill="none"/>
    <path d="M 31,20 C 42,18 44,26 39,32" stroke="#009D64" stroke-width=".8" stroke-linecap="round" fill="none" opacity=".5"/>

    <!-- Signal endpoint dots -->
    <circle cx="36" cy="33" r="2.5" fill="#009D64" fill-opacity=".25" stroke="#009D64" stroke-width="1.2"/>
    <circle cx="39" cy="31" r="1.5" fill="#009D64" fill-opacity=".2" stroke="#009D64" stroke-width=".8" opacity=".6"/>

    <!-- Left incoming event line -->
    <line x1="8" y1="16" x2="17" y2="16" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="3 2" stroke-linecap="round"/>
    <circle cx="8" cy="16" r="2" fill="#94A3B8" fill-opacity=".3" stroke="#94A3B8" stroke-width="1"/>

    <!-- Bottom outbound line -->
    <line x1="24" y1="24" x2="24" y2="36" stroke="#FFC107" stroke-width="1" stroke-linecap="round" opacity=".6"/>
    <circle cx="24" cy="38" r="2" fill="#FFC107" fill-opacity=".25" stroke="#FFC107" stroke-width="1"/>
  </g>
</svg>
