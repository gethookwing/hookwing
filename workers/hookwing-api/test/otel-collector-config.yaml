receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s   # Fast flush for tests — do not use in production

exporters:
  file:
    path: /output/traces.json
    flush_interval: 1s
  otlphttp/asserter:
    endpoint: http://span-asserter:9999
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, otlphttp/asserter]
