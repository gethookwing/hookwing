name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # ============================================================
  # CI gate — must pass before any production deploy
  # ============================================================
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # ============================================================
  # Deploy website to hookwing.com
  # ============================================================
  deploy-website:
    name: Deploy Website → hookwing.com
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          HOOKWING_SITE_URL: https://hookwing.com

      - name: Prepare deploy directory
        run: |
          mkdir -p /tmp/deploy/{pricing,why-hookwing,getting-started,playground,status,signin,signup,privacy,terms,changelog,docs,api/pricing,use-cases,agent-experience}
          
          VERSION=$(date +%s)
          for page in index.html pricing/index.html why-hookwing/index.html getting-started/index.html playground/index.html status/index.html signin/index.html signup/index.html privacy/index.html terms/index.html changelog/index.html use-cases/index.html docs/index.html; do
            if [ -f "$page" ]; then
              sed "s|</head>|<meta name=\"version\" content=\"$VERSION\"></head>|" "$page" > "/tmp/deploy/$page"
            fi
          done
          
          cp -r blog /tmp/deploy/
          cp -r styles /tmp/deploy/
          cp -r assets /tmp/deploy/ 2>/dev/null || true
          cp api/pricing/index.json /tmp/deploy/api/pricing/ 2>/dev/null || true
          cp favicon.svg favicon-32.png apple-touch-icon.png /tmp/deploy/ 2>/dev/null || true
          cp _redirects /tmp/deploy/ 2>/dev/null || true
          cp _headers /tmp/deploy/ 2>/dev/null || true
          cp sitemap.xml /tmp/deploy/ 2>/dev/null || true
          cp site.webmanifest /tmp/deploy/ 2>/dev/null || true
          cp robots.txt /tmp/deploy/ 2>/dev/null || true
          mkdir -p /tmp/deploy/shared && cp shared/*.js /tmp/deploy/shared/ 2>/dev/null || true
          [ -d docs ] && cp -r docs/* /tmp/deploy/docs/ 2>/dev/null || true
          mkdir -p /tmp/deploy/docs/api && cp docs/api/index.html /tmp/deploy/docs/api/ 2>/dev/null || true
          for docdir in docs/getting-started docs/authentication docs/webhooks docs/endpoints docs/agent-integrations docs/cli-reference docs/error-codes docs/sdk-quickstart docs/event-routing; do
            if [ -d "$docdir" ]; then mkdir -p "/tmp/deploy/$docdir" && cp "$docdir/index.html" "/tmp/deploy/$docdir/" 2>/dev/null || true; fi
          done
          cp signup/signup.js /tmp/deploy/signup/ 2>/dev/null || true
          cp signin/signin.js /tmp/deploy/signin/ 2>/dev/null || true
          cp playground/playground.js /tmp/deploy/playground/ 2>/dev/null || true
          [ -d images ] && mkdir -p /tmp/deploy/images && cp images/*.webp /tmp/deploy/images/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy /tmp/deploy --project-name=hookwing-prod --branch=main

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ============================================================
  # Deploy API to Cloudflare Workers (production)
  # ============================================================
  deploy-api:
    name: Deploy API → hookwing-api
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: |
          for f in $(ls ../../migrations/*.sql | sort); do
            echo "Applying $(basename $f)..."
            npx wrangler d1 execute hookwing-prod --remote --file="$f"
          done
        working-directory: packages/api

      - name: Deploy API to Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          command: deploy --env production
