name: Deploy Dev

on:
  push:
    branches: ['dev', 'feature/**']
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ============================================================
  # CI gate — must pass before any deploy
  # ============================================================
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # ============================================================
  # Deploy website to dev.hookwing.com
  # ============================================================
  deploy-website:
    name: Deploy Website → dev.hookwing.com
    runs-on: ubuntu-latest
    needs: [ci]
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          HOOKWING_SITE_URL: https://dev.hookwing.com

      - name: Prepare deploy directory
        run: |
          mkdir -p /tmp/deploy/{pricing,why-hookwing,getting-started,playground,status,signin,signup,privacy,terms,changelog,docs,api/pricing,use-cases,app}
          
          VERSION=$(date +%s)
          for page in index.html pricing/index.html why-hookwing/index.html getting-started/index.html playground/index.html status/index.html signin/index.html signup/index.html privacy/index.html terms/index.html changelog/index.html use-cases/index.html app/index.html; do
            if [ -f "$page" ]; then
              sed "s|</head>|<meta name=\"version\" content=\"$VERSION\"></head>|" "$page" > "/tmp/deploy/$page"
            fi
          done
          
          cp -r blog /tmp/deploy/
          cp -r styles /tmp/deploy/
          cp -r assets /tmp/deploy/ 2>/dev/null || true
          cp api/pricing/index.json /tmp/deploy/api/pricing/ 2>/dev/null || true
          cp favicon.svg favicon-32.png apple-touch-icon.png /tmp/deploy/ 2>/dev/null || true
          [ -d docs ] && cp -r docs/* /tmp/deploy/docs/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy /tmp/deploy --project-name=hookwing-dev --branch=main

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ============================================================
  # Deploy API to Cloudflare Workers (dev)
  # ============================================================
  deploy-api:
    name: Deploy API → hookwing-api-dev
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup infrastructure and deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          preCommands: |
            # Create Queue (idempotent — no-op if exists)
            wrangler queues create webhook-delivery-dev || true

            # Create D1 database (idempotent — no-op if exists)
            # NOTE: Requires CF token to have D1:Edit permission
            wrangler d1 create hookwing-dev || true

            # Resolve D1 database ID using text parsing (no node required)
            DB_ID=$(wrangler d1 list 2>/dev/null | grep -i "hookwing-dev" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)
            if [ -n "$DB_ID" ]; then
              echo "D1 database ID resolved: $DB_ID"
              sed -i "s/database_id = \"placeholder-will-be-set-on-deploy\"/database_id = \"$DB_ID\"/" wrangler.toml
            else
              echo "::warning::Could not resolve D1 ID — token may be missing D1:Read permission"
            fi

            # Run migrations (idempotent — tables use IF NOT EXISTS)
            for f in ../../migrations/*.sql; do
              [ -f "$f" ] && echo "Applying: $f" && wrangler d1 execute hookwing-dev --remote --file="$f" 2>&1 || true
            done
          command: deploy
