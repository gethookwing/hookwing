name: Deploy Dev

on:
  push:
    branches: ['dev', 'feature/**']
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ============================================================
  # CI gate — must pass before any deploy
  # ============================================================
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # ============================================================
  # Deploy website to dev.hookwing.com
  # ============================================================
  deploy-website:
    name: Deploy Website → dev.hookwing.com
    runs-on: ubuntu-latest
    needs: [ci]
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          HOOKWING_SITE_URL: https://dev.hookwing.com

      - name: Prepare deploy directory
        run: |
          mkdir -p /tmp/deploy/{pricing,why-hookwing,getting-started,playground,status,signin,signup,privacy,terms,changelog,docs,api/pricing,use-cases,agent-experience}
          
          VERSION=$(date +%s)
          for page in index.html pricing/index.html why-hookwing/index.html getting-started/index.html playground/index.html status/index.html signin/index.html signup/index.html privacy/index.html terms/index.html changelog/index.html use-cases/index.html docs/index.html agent-experience/index.html; do
            if [ -f "$page" ]; then
              sed "s|</head>|<meta name=\"version\" content=\"$VERSION\"></head>|" "$page" > "/tmp/deploy/$page"
            fi
          done
          
          cp -r blog /tmp/deploy/
          cp -r styles /tmp/deploy/
          cp -r assets /tmp/deploy/ 2>/dev/null || true
          cp api/pricing/index.json /tmp/deploy/api/pricing/ 2>/dev/null || true
          cp favicon.svg favicon-32.png apple-touch-icon.png /tmp/deploy/ 2>/dev/null || true
          cp _redirects /tmp/deploy/ 2>/dev/null || true
          mkdir -p /tmp/deploy/shared && cp shared/*.js /tmp/deploy/shared/ 2>/dev/null || true
          cp _headers /tmp/deploy/ 2>/dev/null || true
          cp sitemap.xml /tmp/deploy/ 2>/dev/null || true
          cp site.webmanifest /tmp/deploy/ 2>/dev/null || true
          cp robots.txt /tmp/deploy/ 2>/dev/null || true
          [ -d docs ] && cp -r docs/* /tmp/deploy/docs/ 2>/dev/null || true
          mkdir -p /tmp/deploy/docs/api && cp docs/api/index.html /tmp/deploy/docs/api/ 2>/dev/null || true
          for docdir in docs/getting-started docs/authentication docs/webhooks docs/endpoints docs/agent-integrations docs/cli-reference docs/error-codes docs/sdk-quickstart; do
            if [ -d "$docdir" ]; then mkdir -p "/tmp/deploy/$docdir" && cp "$docdir/index.html" "/tmp/deploy/$docdir/" 2>/dev/null || true; fi
          done
          cp signup/signup.js /tmp/deploy/signup/ 2>/dev/null || true
          cp signin/signin.js /tmp/deploy/signin/ 2>/dev/null || true
          cp playground/playground.js /tmp/deploy/playground/ 2>/dev/null || true
          [ -d images ] && mkdir -p /tmp/deploy/images && cp images/*.webp /tmp/deploy/images/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy /tmp/deploy --project-name=hookwing-dev --branch=main

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ============================================================
  # Deploy API to Cloudflare Workers (dev)
  # ============================================================
  deploy-api:
    name: Deploy API → hookwing-api-dev
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup infrastructure and deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          preCommands: |
            wrangler queues create webhook-delivery-dev 2>&1 || true
            wrangler d1 create hookwing-dev 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0001_initial_schema.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0002_add_auth_columns.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0003_add_fanout_enabled.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0004_rate_limits.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0005_playground_sessions.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0007_add_dead_letter_queue.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0008_add_custom_domains.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0009_add_endpoint_custom_headers.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0010_add_endpoint_ip_whitelist.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0011_add_delivery_priority.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0012_add_feedback.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0013_add_password_reset_tokens.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0014_add_security_settings.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0015_add_idempotency_keys.sql 2>&1 || true
            wrangler d1 execute hookwing-dev --remote --file=../../migrations/0016_add_routing_rules.sql 2>&1 || true
          command: deploy
