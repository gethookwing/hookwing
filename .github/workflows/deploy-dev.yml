name: Deploy Dev

on:
  push:
    branches: ['feature/**']
    paths:
      - 'website/**'
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to dev.hookwing.com
    runs-on: ubuntu-latest
    needs: []
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          HOOKWING_SITE_URL: https://dev.hookwing.com

      - name: Prepare deploy directory
        run: |
          mkdir -p /tmp/deploy/{pricing,why-hookwing,getting-started,playground,status,signin,privacy,terms,changelog,docs,api/pricing}
          
          # Main pages (add version meta tag for cache busting)
          VERSION=$(date +%s)
          for page in index.html pricing/index.html why-hookwing/index.html getting-started/index.html playground/index.html status/index.html signin/index.html privacy/index.html terms/index.html changelog/index.html; do
            if [ -f "$page" ]; then
              sed "s|</head>|<meta name=\"version\" content=\"$VERSION\"></head>|" "$page" > "/tmp/deploy/$page"
            fi
          done
          
          # Blog (built by build:content)
          cp -r blog /tmp/deploy/

          # Styles (external CSS)
          cp -r styles /tmp/deploy/

          # Assets
          cp -r assets /tmp/deploy/ 2>/dev/null || true
          cp api/pricing/index.json /tmp/deploy/api/pricing/ 2>/dev/null || true
          cp favicon.svg /tmp/deploy/ 2>/dev/null || true
          [ -d docs ] && cp -r docs/* /tmp/deploy/docs/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy /tmp/deploy --project-name=hookwing-dev --branch=main

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
