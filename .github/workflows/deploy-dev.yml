name: Deploy Dev

on:
  push:
    branches: ['dev', 'feature/**']
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ============================================================
  # CI gate — must pass before any deploy
  # ============================================================
  ci:
    name: CI Check
    uses: ./.github/workflows/ci.yml

  # ============================================================
  # Deploy website to dev.hookwing.com
  # ============================================================
  deploy-website:
    name: Deploy Website → dev.hookwing.com
    runs-on: ubuntu-latest
    needs: [ci]
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          HOOKWING_SITE_URL: https://dev.hookwing.com

      - name: Prepare deploy directory
        run: |
          mkdir -p /tmp/deploy/{pricing,why-hookwing,getting-started,playground,status,signin,signup,privacy,terms,changelog,docs,api/pricing,use-cases,app}
          
          VERSION=$(date +%s)
          for page in index.html pricing/index.html why-hookwing/index.html getting-started/index.html playground/index.html status/index.html signin/index.html signup/index.html privacy/index.html terms/index.html changelog/index.html use-cases/index.html app/index.html; do
            if [ -f "$page" ]; then
              sed "s|</head>|<meta name=\"version\" content=\"$VERSION\"></head>|" "$page" > "/tmp/deploy/$page"
            fi
          done
          
          cp -r blog /tmp/deploy/
          cp -r styles /tmp/deploy/
          cp -r assets /tmp/deploy/ 2>/dev/null || true
          cp api/pricing/index.json /tmp/deploy/api/pricing/ 2>/dev/null || true
          cp favicon.svg favicon-32.png apple-touch-icon.png /tmp/deploy/ 2>/dev/null || true
          [ -d docs ] && cp -r docs/* /tmp/deploy/docs/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy /tmp/deploy --project-name=hookwing-dev --branch=main

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  # ============================================================
  # Deploy API to Cloudflare Workers (dev)
  # ============================================================
  deploy-api:
    name: Deploy API → hookwing-api-dev
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create Cloudflare Queue
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler queues create webhook-delivery-dev 2>&1 || true

      - name: Create D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 create hookwing-dev 2>&1 || true

      - name: Resolve D1 database ID and patch wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # List D1 databases and extract the ID for hookwing-dev
          npx wrangler d1 list > /tmp/d1-list.txt 2>&1 || true
          echo "--- D1 list output ---"
          cat /tmp/d1-list.txt

          # Try JSON format first, fall back to text parsing
          DB_ID=""
          if npx wrangler d1 list --json > /tmp/d1-list.json 2>/dev/null; then
            DB_ID=$(node -e "
              try {
                const dbs = JSON.parse(require('fs').readFileSync('/tmp/d1-list.json','utf8'));
                const db = dbs.find(d => d.name === 'hookwing-dev');
                if (db) process.stdout.write(db.uuid);
              } catch(e) {
                process.stderr.write('JSON parse failed: ' + e.message + '\n');
              }
            ")
          fi

          # Fall back: parse text output (format: UUID | name | ...)
          if [ -z "$DB_ID" ]; then
            DB_ID=$(grep "hookwing-dev" /tmp/d1-list.txt | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi

          if [ -n "$DB_ID" ]; then
            echo "D1 database ID: $DB_ID"
            sed -i "s/database_id = \"placeholder-will-be-set-on-deploy\"/database_id = \"$DB_ID\"/" packages/api/wrangler.toml
            echo "--- Patched wrangler.toml ---"
            grep database_id packages/api/wrangler.toml
          else
            echo "::warning::Could not resolve D1 database ID — deploy may fail"
          fi

      - name: Run D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for migration in migrations/*.sql; do
            if [ -f "$migration" ]; then
              echo "Applying: $migration"
              npx wrangler d1 execute hookwing-dev --remote --file="$migration" 2>&1 || true
            fi
          done

      - name: Deploy API to Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api
          command: deploy
